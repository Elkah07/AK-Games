<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0718" />
  <meta name="color-scheme" content="dark" />

  <title>AK'Games</title>
  <meta
    name="description"
    content="Des mini-jeux de soirée à jouer sur un ou plusieurs téléphones."
  />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AK'Games" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splashScreen" class="ak-splash" aria-hidden="true">
    <img src="icons/icon-192.png" alt="" />
    <strong>AK'Games</strong>
    <span>La soirée démarre…</span>
  </div>

  <div id="app">
    <header class="app-header">
      <button id="backBtn" class="icon-btn hidden" aria-label="Retour">←</button>

      <div>
        <p class="eyebrow">AK'Games</p>
        <h1 id="screenTitle">La soirée commence ici</h1>
      </div>

      <button id="settingsBtn" class="icon-btn" aria-label="Paramètres">⚙️</button>
    </header>

    <main id="screen" class="screen"></main>
  </div>

  <div id="installBar" class="ak-install-bar hidden" role="status">
    <div>
      <img src="icons/icon-192.png" alt="" />
      <span>
        <strong>Installer AK'Games</strong>
        <small>Ajoute l'app à ton écran d'accueil.</small>
      </span>
    </div>

    <div class="ak-install-actions">
      <button id="dismissInstall" class="secondary-btn">Plus tard</button>
      <button id="confirmInstall" class="primary-btn">Installer</button>
    </div>
  </div>

  <div id="backToast" class="ak-back-toast hidden" role="status">
    Appuie encore une fois pour quitter AK'Games.
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script src="multiplayer.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
