name: Déployer AKGames sur Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: akgames-firebase-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Déploiement Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Firebase CLI
        run: npm install --global firebase-tools@15.24.0

      - name: Déployer Hosting et Database
        run: firebase deploy --only hosting,database --project ak-games-4a2cd --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
